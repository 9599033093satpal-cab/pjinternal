<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether AI | Access Console</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
    --bg-dark: #0f1219;
    --card-bg: rgba(20, 24, 34, 0.95);
    --primary: #e8a020;
    --primary-gradient: linear-gradient(135deg, #f5c842, #e8a020, #d97706);
    --text-main: #ffffff;
    --text-dim: #9ca3af;
    --input-bg: #e2e8f0;
    --border: rgba(232, 160, 32, 0.3);
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at center, #1a202c 0%, var(--bg-dark) 100%);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
}

/* Background Elements */
.bg-glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
}

/* The Card */
.login-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(232, 160, 32, 0.05);
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Logo Section */
.logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
}
.logo-icon {
    width: 48px; height: 48px;
    color: var(--primary);
    margin-bottom: 16px;
    filter: drop-shadow(0 0 10px rgba(232,160,32,0.4));
}
.logo-text {
    font-family: 'Outfit', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--primary);
    text-transform: uppercase;
}
.logo-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
}

/* Form Title */
.form-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.divider {
    display: flex;
    align-items: center;
    width: 100%;
    margin: 20px 0;
    color: var(--text-dim);
    font-size: 0.75rem;
}
.divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
}
.divider span { padding: 0 10px; }

/* Role Selector */
.role-matrix {
    width: 100%;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
}
.role-btn {
    flex: 1;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.role-btn i { width: 16px; height: 16px; }
.role-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.role-btn.active {
    background: rgba(232, 160, 32, 0.1);
    border-color: var(--primary);
    color: var(--primary);
}

/* Inputs */
.input-group {
    width: 100%;
    margin-bottom: 16px;
    position: relative;
}
.input-field {
    width: 100%;
    background: var(--input-bg);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 1rem;
    color: #0f1219;
    font-weight: 600;
    outline: none;
    transition: all 0.3s;
}
.input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(232,160,32,0.2); }
.input-field::placeholder { color: #64748b; font-weight: 500; }

.phone-wrapper {
    display: flex;
    background: var(--input-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.3s;
}
.phone-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(232,160,32,0.2); }
.phone-prefix {
    padding: 16px 20px;
    background: rgba(0,0,0,0.05);
    color: #334155;
    font-weight: 700;
    border-right: 1px solid rgba(0,0,0,0.1);
}
.phone-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 16px;
    font-size: 1rem;
    color: #0f1219;
    font-weight: 600;
    outline: none;
}
.phone-wrapper input::placeholder { color: #64748b; font-weight: 500; }

/* OTP Section */
.otp-container {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: all 0.4s ease;
    opacity: 0;
}
.otp-container.visible {
    max-height: 200px;
    opacity: 1;
    margin-bottom: 16px;
}
.otp-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-top: 10px;
}
.otp-box {
    width: 100%;
    height: 54px;
    background: var(--input-bg);
    border: 2px solid transparent;
    border-radius: 10px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: #0f1219;
    outline: none;
    transition: all 0.2s;
}
.otp-box:focus { border-color: var(--primary); }

/* Main Button */
.btn-submit {
    width: 100%;
    background: var(--primary-gradient);
    color: #0f1219;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    box-shadow: 0 10px 25px rgba(232, 160, 32, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(232, 160, 32, 0.5); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; filter: grayscale(1); box-shadow: none; }

/* Secondary Actions */
.btn-secondary {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    border-radius: 12px;
    padding: 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
}
.btn-secondary:hover { background: rgba(255,255,255,0.05); color: #fff; }

.footer-links {
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--text-dim);
}
.footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
.footer-links a:hover { text-decoration: underline; }

.error-msg {
    color: #ef4444;
    font-size: 0.85rem;
    font-weight: 500;
    margin-top: 12px;
    display: none;
    text-align: center;
}

</style>
</head>
<body>

<div class="bg-glow"></div>

<a href="/" style="position:absolute; top:24px; left:24px; color:var(--text-dim); text-decoration:none; font-size:0.85rem; display:flex; align-items:center; gap:6px; font-weight:600; transition:color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-dim)'">
    <i data-lucide="arrow-left" style="width:16px; height:16px;"></i> Back to Website
</a>

<div class="login-card">
    <div class="logo-container">
        <i data-lucide="scan-line" class="logo-icon"></i>
        <div class="logo-text">AETHER</div>
        <div class="logo-sub">INTELLIGENCE PLATFORM</div>
    </div>

    <div class="form-title" id="formTitle">SIGN IN</div>

    <div class="role-matrix">
        <button class="role-btn active" onclick="selectRole(this, 'admin')">
            <i data-lucide="shield-check"></i> Admin
        </button>
        <button class="role-btn" onclick="selectRole(this, 'user')">
            <i data-lucide="building-2"></i> Client
        </button>
    </div>

    <div class="divider"><span>or use mobile</span></div>

    <div class="input-group" id="phoneSection">
        <div class="phone-wrapper">
            <div class="phone-prefix">+91</div>
            <input type="tel" id="phoneInput" placeholder="Enter your mobile number" maxlength="10" autocomplete="off">
        </div>
    </div>

    <div class="otp-container" id="otpSection">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:600; color:var(--text-dim);">
            <span>Enter Verification Code</span>
            <a href="#" onclick="resetForm()" style="color:var(--primary); text-decoration:none;">Change Number</a>
        </div>
        <div class="otp-grid">
            <input type="text" class="otp-box" id="o1" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" id="o2" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" id="o3" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" id="o4" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" id="o5" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" id="o6" maxlength="1" inputmode="numeric">
        </div>
    </div>

    <button class="btn-submit" id="mainBtn" onclick="handleAction()">
        ENTER PLATFORM
    </button>

    <button class="btn-secondary" onclick="window.location.href='/'">
        Continue as Guest
    </button>

    <div class="error-msg" id="errorMessage"></div>

    <div class="footer-links">
        No account? <a href="/">Create Account</a>
    </div>
</div>

<script>
lucide.createIcons();

let currentRole = 'admin';
let isOtpSent = false;
const otpIds = ['o1','o2','o3','o4','o5','o6'];

function selectRole(el, role) {
    if (isOtpSent) return;
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');
}

otpIds.forEach((id, idx) => {
    const el = document.getElementById(id);
    el.addEventListener('input', (e) => {
        if (e.target.value && idx < 5) document.getElementById(otpIds[idx+1]).focus();
        checkOtpComplete();
    });
    el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !el.value && idx > 0) {
            document.getElementById(otpIds[idx-1]).focus();
            document.getElementById(otpIds[idx-1]).value = '';
        }
        if (e.key === 'Enter' && isOtpSent) verifyOtp();
    });
});

function checkOtpComplete() {
    const otp = otpIds.map(id => document.getElementById(id).value).join('');
    if (otp.length === 6) verifyOtp();
}

function handleAction() {
    if (!isOtpSent) sendOtp();
    else verifyOtp();
}

async function sendOtp() {
    const phone = document.getElementById('phoneInput').value;
    const error = document.getElementById('errorMessage');
    
    if (!/^\d{10}$/.test(phone)) {
        error.innerText = "Please enter a valid 10-digit mobile number.";
        error.style.display = "block";
        return;
    }

    error.style.display = "none";
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    btn.innerHTML = 'SENDING...';

    try {
        const response = await fetch('/api/send_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone })
        });
        
        if (!response.ok) throw new Error("Failed");

        isOtpSent = true;
        btn.disabled = false;
        
        document.getElementById('phoneSection').style.display = "none";
        document.getElementById('otpSection').classList.add('visible');
        btn.innerHTML = 'VERIFY & ENTER';
        
        document.getElementById('o1').focus();
    } catch (err) {
        error.innerText = "Error sending verification code. Please try again.";
        error.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = 'ENTER PLATFORM';
    }
}

async function verifyOtp() {
    const otp = otpIds.map(id => document.getElementById(id).value).join('');
    const error = document.getElementById('errorMessage');
    const btn = document.getElementById('mainBtn');

    if (otp.length < 6) return;

    btn.disabled = true;
    btn.innerHTML = "AUTHENTICATING...";
    error.style.display = "none";

    try {
        const phone = document.getElementById('phoneInput').value;
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: currentRole, phone: phone, otp: otp })
        });
        const data = await response.json();

        if (data.success) {
            sessionStorage.setItem('userName', data.user_name);
            localStorage.setItem('role', currentRole);
            btn.innerHTML = "SUCCESS";
            btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
            setTimeout(() => {
                window.location.href = data.redirect || '/dashboard';
            }, 500);
        } else {
            throw new Error("Invalid OTP");
        }
    } catch (err) {
        error.innerText = "Invalid verification code. Please try again.";
        error.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "VERIFY & ENTER";
        otpIds.forEach(id => document.getElementById(id).value = '');
        document.getElementById('o1').focus();
    }
}

function resetForm() {
    isOtpSent = false;
    document.getElementById('phoneSection').style.display = "block";
    document.getElementById('otpSection').classList.remove('visible');
    document.getElementById('mainBtn').innerHTML = "ENTER PLATFORM";
    document.getElementById('errorMessage').style.display = "none";
    otpIds.forEach(id => document.getElementById(id).value = '');
}
</script>
</body>
</html>
